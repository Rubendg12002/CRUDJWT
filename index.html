<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Productos con JWT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Esta regla es la magia que oculta el CRUD al inicio */
        .oculto { display: none !important; }
    </style>
</head>
<body class="bg-light">

    <div id="seccion-login" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h4 class="card-title text-center mb-4">Iniciar Sesión</h4>
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" id="login-usuario" class="form-control" placeholder="Ej: admin">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="login-password" class="form-control" placeholder="••••••••">
                        </div>
                        <button onclick="login()" class="btn btn-success w-100">Ingresar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="seccion-crud" class="container mt-5 oculto">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestión de Productos</h2>
            <button onclick="cerrarSesion()" class="btn btn-danger btn-sm">Cerrar Sesión</button>
        </div>
        
        <div class="card shadow mb-4">
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-3"><input type="text" id="codigo" class="form-control" placeholder="Código"></div>
                    <div class="col-md-4"><input type="text" id="producto" class="form-control" placeholder="Producto"></div>
                    <div class="col-md-2"><input type="number" id="precio" class="form-control" placeholder="Precio"></div>
                    <div class="col-md-2"><input type="number" id="cantidad" class="form-control" placeholder="Cantidad"></div>
                    <div class="col-md-1"><button onclick="guardar()" class="btn btn-primary w-100">Guardar</button></div>
                </div>
            </div>
        </div>

        <table class="table table-striped table-hover shadow-sm bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
